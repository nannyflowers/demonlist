<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platinum's Demonlist</title>
    <link rel="icon" type="image/x-icon" href="/assets/hard demon.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-content">
            <h1>Platinum's Demonlist</h1>

            <button id="open-form-btn" class="submit-demon-button">Submit Demon</button>
            <div id="controls" class="sort-menu">
                <input type="date" value="" class="date-input" id="date-input">
                <label for="sort">Sort by:</label>
                <select id="sort">
                    <option value="gddl_rating">GDDL Rating</option>
                    <option value="enjoyment">Enjoyment</option>
                    <option value="attempts">Attempts</option>
                    <option value="date_beaten">Date Beaten</option>
                </select>
                <button id="sort-order" class="sort-btn" title="Toggle ascending/descending">↓</button>
            </div>
        </div>

    </header>

    <main>
        <div id="demon-list"></div>
        <div id="form-overlay" style="display: none;">
            <div id="add-demon-form">
                <h2>Add a New Demon</h2>

                <label for="demon-name">Demon Name</label>
                <input id="demon-name" type="text" placeholder="Enter demon name">

                <label for="level-id">Level ID</label>
                <input id="level-id" type="text" placeholder="Enter level ID">

                <label for="difficulty">Difficulty</label>
                <input id="difficulty" type="text" placeholder="Enter demon difficulty">

                <label for="attempts">Attempts</label>
                <input id="attempts" type="number" placeholder="Number of attempts">

                <label for="gddl-rating">GDDL Rating</label>
                <input id="gddl-rating" type="number" step="0.1" placeholder="GDDL rating">

                <label for="enjoyment">Enjoyment</label>
                <input id="enjoyment" type="number" step="0.1" placeholder="Enjoyment rating">

                <label for="date-beaten">Date Beaten</label>
                <input id="date-beaten" type="date">

                <div class="form-buttons">
                    <button id="submit-demon" class="submit-demon-button">Submit</button>
                    <button id="cancel-demon" class="submit-demon-button cancel-btn">Cancel</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
